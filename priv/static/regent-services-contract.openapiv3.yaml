openapi: 3.1.0
info:
  title: Regent Shared Services Contract
  version: 0.1.0
  description: >
    Source-of-truth contract for shared Regent service rails that are not product-owned.
    This file owns shared SIWA auth, Regent staking, and shared operator reporting rails.
    Shared SIWA implementation lives in the `elixir-utils/siwa/siwa-elixir` codebase.
tags:
  - name: identity
  - name: auth
  - name: internal
  - name: regent-staking
  - name: reports
paths:
  /healthz:
    get:
      operationId: siwaServerHealthz
      tags: [auth]
      responses:
        "200":
          description: Simple health check response for the shared SIWA server
          content:
            text/plain:
              schema:
                type: string
  /metrics:
    get:
      operationId: siwaServerMetrics
      tags: [auth]
      responses:
        "200":
          description: Prometheus scrape payload for the shared SIWA server
          content:
            text/plain:
              schema:
                type: string
  /regent-services-contract.openapiv3.yaml:
    get:
      operationId: regentServicesContractSource
      tags: [auth]
      responses:
        "200":
          description: Source-of-truth shared services contract served by the SIWA server
          content:
            application/yaml:
              schema:
                type: string
  /v1/identity/status:
    post:
      operationId: getIdentityStatus
      tags: [identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityStatusRequest"
      responses:
        "200":
          description: Identity status resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityStatusResponse"
        "400":
          description: Invalid identity status request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/identity/registration-intents:
    post:
      operationId: createIdentityRegistrationIntent
      tags: [identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityRegistrationIntentRequest"
      responses:
        "200":
          description: Registration intent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityRegistrationIntentResponse"
        "400":
          description: Invalid registration intent request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/identity/registration-completions:
    post:
      operationId: completeIdentityRegistration
      tags: [identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityRegistrationCompletionRequest"
      responses:
        "200":
          description: Registration completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityRegistrationCompletionResponse"
        "400":
          description: Invalid registration completion request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Registration authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/identity/siwa/nonce:
    post:
      operationId: createIdentitySiwaNonce
      tags: [identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentitySiwaNonceRequest"
      responses:
        "200":
          description: SIWA nonce issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentitySiwaNonceResponse"
        "400":
          description: Invalid SIWA nonce request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/identity/siwa/verify:
    post:
      operationId: verifyIdentitySiwaSession
      tags: [identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentitySiwaVerifyRequest"
      responses:
        "200":
          description: Identity verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentitySiwaVerifyResponse"
        "400":
          description: Invalid SIWA verification request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Signature or nonce validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/agent/siwa/nonce:
    post:
      operationId: createSharedAgentSiwaNonce
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiwaNonceRequest"
      responses:
        "200":
          description: Shared SIWA nonce issued for one app audience
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiwaNonceResponse"
        "400":
          description: Invalid SIWA nonce request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/agent/siwa/verify:
    post:
      operationId: verifySharedAgentSiwaSession
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiwaVerifyRequest"
      responses:
        "200":
          description: Shared SIWA identity verified for one app audience
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiwaVerifyResponse"
        "400":
          description: Invalid SIWA verification request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Signature or nonce validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/agent/siwa/http-verify:
    post:
      operationId: verifySharedSiwaHttpEnvelope
      tags: [auth]
      parameters:
        - in: header
          name: x-siwa-audience
          required: true
          schema:
            type: string
          description: App audience that the SIWA receipt must match for this protected request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiwaHttpVerifyRequest"
      responses:
        "200":
          description: Protected request envelope verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiwaHttpVerifyResponse"
        "400":
          description: Invalid envelope request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Envelope verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /internal/keyring/health:
    get:
      operationId: siwaKeyringHealth
      tags: [internal]
      responses:
        "200":
          description: Internal signer health response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LooseObject"
  /internal/keyring/create-wallet:
    post:
      operationId: siwaKeyringCreateWallet
      tags: [internal]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LooseObject"
      responses:
        "200":
          description: Wallet created or returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LooseObject"
        "400":
          description: Invalid keyring request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Internal signer authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "413":
          description: Keyring request body too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "415":
          description: Unsupported keyring request content type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: Wallet could not be created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /internal/keyring/has-wallet:
    post:
      operationId: siwaKeyringHasWallet
      tags: [internal]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LooseObject"
      responses:
        "200":
          description: Wallet presence check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LooseObject"
        "400":
          description: Invalid keyring request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Internal signer authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "413":
          description: Keyring request body too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "415":
          description: Unsupported keyring request content type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: Wallet presence could not be checked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /internal/keyring/get-address:
    post:
      operationId: siwaKeyringGetAddress
      tags: [internal]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LooseObject"
      responses:
        "200":
          description: Wallet address lookup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LooseObject"
        "400":
          description: Invalid keyring request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Internal signer authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Wallet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "413":
          description: Keyring request body too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "415":
          description: Unsupported keyring request content type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: Wallet address could not be read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /internal/keyring/sign-message:
    post:
      operationId: siwaKeyringSignMessage
      tags: [internal]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LooseObject"
      responses:
        "200":
          description: Message signed with the internal keyring
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LooseObject"
        "400":
          description: Invalid message signing request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Internal signer authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "413":
          description: Keyring request body too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "415":
          description: Unsupported keyring request content type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: Message could not be signed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /internal/keyring/sign-raw-message:
    post:
      operationId: siwaKeyringSignRawMessage
      tags: [internal]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LooseObject"
      responses:
        "200":
          description: Raw payload signed with the internal keyring
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LooseObject"
        "400":
          description: Invalid raw-message signing request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Internal signer authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "413":
          description: Keyring request body too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "415":
          description: Unsupported keyring request content type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: Raw message could not be signed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /internal/keyring/sign-transaction:
    post:
      operationId: siwaKeyringSignTransaction
      tags: [internal]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LooseObject"
      responses:
        "200":
          description: Transaction signed with the internal keyring
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LooseObject"
        "400":
          description: Invalid transaction signing request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Internal signer authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "413":
          description: Keyring request body too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "415":
          description: Unsupported keyring request content type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: Transaction could not be signed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /internal/keyring/sign-authorization:
    post:
      operationId: siwaKeyringSignAuthorization
      tags: [internal]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LooseObject"
      responses:
        "200":
          description: Authorization payload signed with the internal keyring
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LooseObject"
        "400":
          description: Invalid authorization signing request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Internal signer authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "413":
          description: Keyring request body too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "415":
          description: Unsupported keyring request content type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: Authorization payload could not be signed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/agent/regent/staking:
    get:
      operationId: getAgentRegentStakingOverview
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      responses:
        "200":
          description: Staking overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegentStakingOverviewResponse"
  /v1/agent/regent/staking/account/{address}:
    get:
      operationId: getAgentRegentStakingAccount
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      parameters:
        - name: address
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Address"
      responses:
        "200":
          description: Account staking state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegentStakingAccountResponse"
  /v1/agent/regent/staking/stake:
    post:
      operationId: stakeAgentRegent
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmountRequest"
      responses:
        "200":
          description: Stake prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /v1/agent/regent/staking/unstake:
    post:
      operationId: unstakeAgentRegent
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmountRequest"
      responses:
        "200":
          description: Unstake prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /v1/agent/regent/staking/claim-usdc:
    post:
      operationId: claimAgentRegentStakingUsdc
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: Claim prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /v1/agent/regent/staking/claim-regent:
    post:
      operationId: claimAgentRegentStakingRegent
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: Regent claim prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /v1/agent/regent/staking/claim-and-restake-regent:
    post:
      operationId: claimAndRestakeAgentRegentStakingRegent
      tags: [regent-staking]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: Regent claim and restake prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparedActionResponse"
  /v1/agent/bug-report:
    post:
      operationId: createAgentBugReport
      tags: [reports]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BugReportRequest"
      responses:
        "200":
          description: Bug report stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BugReportResponse"
        "400":
          description: Invalid report payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/agent/security-report:
    post:
      operationId: createAgentSecurityReport
      tags: [reports]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecurityReportRequest"
      responses:
        "200":
          description: Security report stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityReportResponse"
        "400":
          description: Invalid report payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  securitySchemes:
    AgentSiwaHeaders:
      type: apiKey
      in: header
      name: x-siwa-receipt
      description: >
        Signed Agent account header bundle for authenticated agent requests. The current
        shape includes the receipt, signature, signature-input, key ID, timestamp, wallet,
        chain, registry address, token ID, and content digest when the request has a body.
  schemas:
    Address:
      type: string
      pattern: "^0x[a-fA-F0-9]{40}$"
    BaseChainId:
      type: integer
      enum: [84532, 8453]
    HexData:
      type: string
      pattern: "^0x[a-fA-F0-9]*$"
    DecimalString:
      type: string
    IdentityNetwork:
      type: string
      enum: [base, base-sepolia]
    IdentityProvider:
      type: string
      enum: [coinbase-cdp]
    IdentityVerificationStatus:
      type: string
      enum: [unregistered, onchain]
    IdentityStatusRequest:
      type: object
      required: [network, address, provider]
      properties:
        network:
          $ref: "#/components/schemas/IdentityNetwork"
        address:
          $ref: "#/components/schemas/Address"
        provider:
          $ref: "#/components/schemas/IdentityProvider"
        wallet_hint:
          type: string
      additionalProperties: false
    IdentityStatusResponse:
      type: object
      required: [ok, code, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        code:
          type: string
          enum: [identity_status_resolved]
        data:
          type: object
          required: [network, address, provider, registered, verified]
          properties:
            network:
              $ref: "#/components/schemas/IdentityNetwork"
            address:
              $ref: "#/components/schemas/Address"
            provider:
              $ref: "#/components/schemas/IdentityProvider"
            registered:
              type: boolean
            verified:
              $ref: "#/components/schemas/IdentityVerificationStatus"
            agent_id:
              type: integer
            agent_registry:
              type: string
            receipt_expires_at:
              type: string
              format: date-time
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/LooseObject"
      additionalProperties: false
    IdentityRegistrationIntentRequest:
      type: object
      required: [network, address, provider]
      properties:
        network:
          $ref: "#/components/schemas/IdentityNetwork"
        address:
          $ref: "#/components/schemas/Address"
        provider:
          $ref: "#/components/schemas/IdentityProvider"
        wallet_hint:
          type: string
      additionalProperties: false
    IdentityRegistrationIntentResponse:
      type: object
      required: [ok, code, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        code:
          type: string
          enum: [identity_registration_intent_created]
        data:
          type: object
          required: [intent_id, intent_kind, signing_payload]
          properties:
            intent_id:
              type: string
            intent_kind:
              type: string
            signing_payload:
              type: object
              required: [message]
              properties:
                message:
                  type: string
              additionalProperties: true
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/LooseObject"
      additionalProperties: false
    IdentityRegistrationCompletionRequest:
      type: object
      required: [intent_id, signature, address]
      properties:
        intent_id:
          type: string
        message:
          type: string
          description: Canonical SIWA message containing wallet address, chain id, registry address, token id, nonce, and issue time.
        signature:
          $ref: "#/components/schemas/HexData"
        address:
          $ref: "#/components/schemas/Address"
      additionalProperties: false
    IdentityRegistrationCompletionResponse:
      type: object
      required: [ok, code, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        code:
          type: string
          enum: [identity_registration_completed]
        data:
          type: object
          required: [registered, agent_id, agent_registry]
          properties:
            registered:
              type: boolean
              enum: [true]
            agent_id:
              type: integer
            agent_registry:
              type: string
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/LooseObject"
      additionalProperties: false
    IdentitySiwaNonceRequest:
      type: object
      required: [network, address, agent_id, agent_registry]
      properties:
        network:
          $ref: "#/components/schemas/IdentityNetwork"
        address:
          $ref: "#/components/schemas/Address"
        agent_id:
          type: integer
        agent_registry:
          type: string
      additionalProperties: false
    IdentitySiwaNonceResponse:
      type: object
      required: [ok, code, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        code:
          type: string
          enum: [identity_siwa_nonce_issued]
        data:
          type: object
          required: [nonce_token, message, address, agent_id, agent_registry, expires_at]
          properties:
            nonce_token:
              type: string
            message:
              type: string
            address:
              $ref: "#/components/schemas/Address"
            agent_id:
              type: integer
            agent_registry:
              type: string
            expires_at:
              type: string
              format: date-time
          additionalProperties: false
