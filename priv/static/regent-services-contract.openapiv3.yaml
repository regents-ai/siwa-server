openapi: 3.1.0
info:
  title: Regent Shared Services Contract
  version: 0.1.0
  description: >
    Source-of-truth contract for the shared SIWA server. This service owns shared
    SIWA authentication, signed request verification, health, metrics, contract
    discovery, and the internal keyring routes.
tags:
  - name: auth
  - name: internal
paths:
  /healthz:
    get:
      operationId: siwaServerHealthz
      tags: [auth]
      responses:
        "200":
          description: Simple health check response for the shared SIWA server
          content:
            text/plain:
              schema:
                type: string
  /readyz:
    get:
      operationId: siwaServerReadyz
      tags: [auth]
      responses:
        "200":
          description: Readiness checks passed for the shared SIWA server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: One or more readiness checks failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /metrics:
    get:
      operationId: siwaServerMetrics
      tags: [auth]
      responses:
        "200":
          description: Prometheus scrape payload for the shared SIWA server
          content:
            text/plain:
              schema:
                type: string
  /regent-services-contract.openapiv3.yaml:
    get:
      operationId: regentServicesContractSource
      tags: [auth]
      responses:
        "200":
          description: Source-of-truth contract served by the shared SIWA server
          content:
            application/yaml:
              schema:
                type: string
  /v1/agent/siwa/nonce:
    post:
      operationId: createSharedAgentSiwaNonce
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiwaNonceRequest"
      responses:
        "200":
          description: Shared SIWA nonce issued for one app audience
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiwaNonceResponse"
        "400":
          description: Invalid SIWA nonce request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "413":
          description: SIWA nonce request body is too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/agent/siwa/verify:
    post:
      operationId: verifySharedAgentSiwaSession
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiwaVerifyRequest"
      responses:
        "200":
          description: Shared SIWA identity verified for one app audience
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiwaVerifyResponse"
        "400":
          description: Invalid SIWA verification request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Signature or nonce validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: SIWA nonce was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "413":
          description: SIWA verification request body is too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: SIWA verification is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "502":
          description: Agent identity lookup failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/agent/siwa/http-verify:
    post:
      operationId: verifySharedSiwaHttpEnvelope
      tags: [auth]
      parameters:
        - in: header
          name: x-siwa-audience
          required: true
          schema:
            type: string
          description: App audience that the SIWA receipt must match for this protected request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiwaHttpVerifyRequest"
      responses:
        "200":
          description: Protected request envelope verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiwaHttpVerifyResponse"
        "400":
          description: Invalid envelope request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Envelope verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Request replay detected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "413":
          description: SIWA protected request envelope is too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: SIWA HTTP verification is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /internal/keyring/health:
    get:
      operationId: siwaKeyringHealth
      tags: [internal]
      responses:
        "200":
          description: Internal signer health response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyringHealthResponse"
  /internal/keyring/create-wallet:
    post:
      operationId: siwaKeyringCreateWallet
      tags: [internal]
      security:
        - KeyringHmacTimestamp: []
          KeyringHmacSignature: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmptyObject"
      responses:
        "200":
          description: Wallet created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyringWalletResponse"
        "401":
          description: Internal signer authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "413":
          description: Internal signer request body is too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "422":
          description: Wallet could not be created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
  /internal/keyring/has-wallet:
    post:
      operationId: siwaKeyringHasWallet
      tags: [internal]
      security:
        - KeyringHmacTimestamp: []
          KeyringHmacSignature: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmptyObject"
      responses:
        "200":
          description: Wallet presence check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyringHasWalletResponse"
        "401":
          description: Internal signer authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "413":
          description: Internal signer request body is too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "422":
          description: Wallet presence could not be checked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
  /internal/keyring/get-address:
    post:
      operationId: siwaKeyringGetAddress
      tags: [internal]
      security:
        - KeyringHmacTimestamp: []
          KeyringHmacSignature: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmptyObject"
      responses:
        "200":
          description: Wallet address lookup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyringAddressResponse"
        "401":
          description: Internal signer authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "413":
          description: Internal signer request body is too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "404":
          description: Wallet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "422":
          description: Wallet address could not be read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
  /internal/keyring/sign-message:
    post:
      operationId: siwaKeyringSignMessage
      tags: [internal]
      security:
        - KeyringHmacTimestamp: []
          KeyringHmacSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeyringSignMessageRequest"
      responses:
        "200":
          description: Message signed with the internal keyring
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyringSignatureResponse"
        "400":
          description: Invalid message signing request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "401":
          description: Internal signer authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "413":
          description: Internal signer request body is too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "422":
          description: Message could not be signed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
  /internal/keyring/sign-raw-message:
    post:
      operationId: siwaKeyringSignRawMessage
      tags: [internal]
      security:
        - KeyringHmacTimestamp: []
          KeyringHmacSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeyringSignRawMessageRequest"
      responses:
        "200":
          description: Raw payload signed with the internal keyring
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyringSignatureResponse"
        "400":
          description: Invalid raw-message signing request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "401":
          description: Internal signer authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "413":
          description: Internal signer request body is too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "422":
          description: Raw message could not be signed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
  /internal/keyring/sign-transaction:
    post:
      operationId: siwaKeyringSignTransaction
      tags: [internal]
      security:
        - KeyringHmacTimestamp: []
          KeyringHmacSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeyringSignTransactionRequest"
      responses:
        "200":
          description: Transaction signed with the internal keyring
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyringSignedTransactionResponse"
        "400":
          description: Invalid transaction signing request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "401":
          description: Internal signer authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "413":
          description: Internal signer request body is too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "422":
          description: Transaction could not be signed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
  /internal/keyring/sign-authorization:
    post:
      operationId: siwaKeyringSignAuthorization
      tags: [internal]
      security:
        - KeyringHmacTimestamp: []
          KeyringHmacSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeyringSignAuthorizationRequest"
      responses:
        "200":
          description: Authorization payload signed with the internal keyring
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyringSignedAuthorizationResponse"
        "400":
          description: Invalid authorization signing request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "401":
          description: Internal signer authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "413":
          description: Internal signer request body is too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "422":
          description: Authorization payload could not be signed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
components:
  securitySchemes:
    KeyringHmacTimestamp:
      type: apiKey
      in: header
      name: x-keyring-timestamp
    KeyringHmacSignature:
      type: apiKey
      in: header
      name: x-keyring-signature
  schemas:
    Address:
      type: string
      pattern: "^0x[a-fA-F0-9]{40}$"
    BaseChainId:
      type: integer
      enum: [84532, 8453]
    HexData:
      type: string
      pattern: "^0x[a-fA-F0-9]*$"
    SiwaNonceRequest:
      type: object
      required: [wallet_address, chain_id, registry_address, token_id, audience]
      properties:
        wallet_address:
          $ref: "#/components/schemas/Address"
        chain_id:
          $ref: "#/components/schemas/BaseChainId"
        registry_address:
          $ref: "#/components/schemas/Address"
        token_id:
          type: string
        audience:
          type: string
      additionalProperties: false
    SiwaNonceResponse:
      type: object
      required: [ok, code, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        code:
          type: string
          enum: [nonce_issued]
        data:
          type: object
          required: [nonce, walletAddress, chainId, registryAddress, tokenId, audience, expiresAt]
          properties:
            nonce:
              type: string
            walletAddress:
              $ref: "#/components/schemas/Address"
            chainId:
              $ref: "#/components/schemas/BaseChainId"
            registryAddress:
              $ref: "#/components/schemas/Address"
            tokenId:
              type: string
            audience:
              type: string
            expiresAt:
              type: string
              format: date-time
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/LooseObject"
      additionalProperties: false
    SiwaVerifyRequest:
      type: object
      required: [wallet_address, chain_id, registry_address, token_id, audience, nonce, message, signature]
      properties:
        wallet_address:
          $ref: "#/components/schemas/Address"
        chain_id:
          $ref: "#/components/schemas/BaseChainId"
        registry_address:
          $ref: "#/components/schemas/Address"
        token_id:
          type: string
        audience:
          type: string
        nonce:
          type: string
        message:
          type: string
        signature:
          $ref: "#/components/schemas/HexData"
      additionalProperties: false
    SiwaVerifyResponse:
      type: object
      required: [ok, code, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        code:
          type: string
          enum: [siwa_verified]
        data:
          type: object
          required: [verified, walletAddress, chainId, registryAddress, tokenId, audience, nonce, keyId, signatureScheme, receipt, receiptIssuedAt, receiptExpiresAt]
          properties:
            verified:
              type: boolean
              enum: [true]
            walletAddress:
              $ref: "#/components/schemas/Address"
            chainId:
              $ref: "#/components/schemas/BaseChainId"
            registryAddress:
              $ref: "#/components/schemas/Address"
            tokenId:
              type: string
            audience:
              type: string
            nonce:
              type: string
            keyId:
              type: string
            signatureScheme:
              type: string
            receipt:
              type: string
            receiptIssuedAt:
              type: string
              format: date-time
            receiptExpiresAt:
              type: string
              format: date-time
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/LooseObject"
      additionalProperties: false
    SiwaHttpVerifyRequest:
      type: object
      required: [method, path, headers]
      properties:
        method:
          type: string
        path:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        body:
          type: string
      additionalProperties: false
    SiwaHttpVerifyResponse:
      type: object
      required: [ok, code, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        code:
          type: string
          enum: [http_envelope_valid]
        data:
          type: object
          required: [verified, walletAddress, chainId, keyId, agent_claims, receiptExpiresAt, requiredHeaders, requiredCoveredComponents, coveredComponents]
          properties:
            verified:
              type: boolean
              enum: [true]
            walletAddress:
              $ref: "#/components/schemas/Address"
            chainId:
              $ref: "#/components/schemas/BaseChainId"
            keyId:
              type: string
            agent_claims:
              $ref: "#/components/schemas/AgentClaims"
            receiptExpiresAt:
              type: string
              format: date-time
            requiredHeaders:
              type: array
              items:
                type: string
            requiredCoveredComponents:
              type: array
              items:
                type: string
            coveredComponents:
              type: array
              items:
                type: string
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/LooseObject"
      additionalProperties: false
    AgentClaims:
      type: object
      required: [wallet_address, chain_id, registry_address, token_id]
      properties:
        wallet_address:
          $ref: "#/components/schemas/Address"
        chain_id:
          $ref: "#/components/schemas/BaseChainId"
        registry_address:
          $ref: "#/components/schemas/Address"
        token_id:
          type: string
        audience:
          type: string
      additionalProperties: true
    EmptyObject:
      type: object
      additionalProperties: false
    KeyringHealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
      additionalProperties: false
    KeyringWalletResponse:
      type: object
      required: [public_key, address, signer_type]
      properties:
        public_key:
          $ref: "#/components/schemas/HexData"
        address:
          $ref: "#/components/schemas/Address"
        signer_type:
          type: string
          enum: [eoa]
      additionalProperties: false
    KeyringHasWalletResponse:
      type: object
      required: [has_wallet]
      properties:
        has_wallet:
          type: boolean
      additionalProperties: false
    KeyringAddressResponse:
      type: object
      required: [address]
      properties:
        address:
          $ref: "#/components/schemas/Address"
      additionalProperties: false
    KeyringSignMessageRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
      additionalProperties: false
    KeyringSignRawMessageRequest:
      type: object
      required: [payload]
      properties:
        payload:
          type: string
      additionalProperties: false
    KeyringEnvelopeObject:
      type: object
      minProperties: 1
      additionalProperties: true
    KeyringSignTransactionRequest:
      type: object
      required: [transaction]
      properties:
        transaction:
          $ref: "#/components/schemas/KeyringEnvelopeObject"
      additionalProperties: false
    KeyringSignAuthorizationRequest:
      type: object
      required: [authorization]
      properties:
        authorization:
          $ref: "#/components/schemas/KeyringEnvelopeObject"
      additionalProperties: false
    KeyringSignatureResponse:
      type: object
      required: [signature]
      properties:
        signature:
          $ref: "#/components/schemas/HexData"
      additionalProperties: false
    KeyringRawSignature:
      type: object
      required: [purpose, signer_type, digest, signature, public_key, address]
      properties:
        purpose:
          type: string
          enum: [raw]
        signer_type:
          type: string
          enum: [eoa]
        digest:
          $ref: "#/components/schemas/HexData"
        signature:
          $ref: "#/components/schemas/HexData"
        public_key:
          $ref: "#/components/schemas/HexData"
        address:
          $ref: "#/components/schemas/Address"
      additionalProperties: false
    KeyringSignedTransactionResponse:
      type: object
      required: [transaction, signature]
      properties:
        transaction:
          $ref: "#/components/schemas/KeyringEnvelopeObject"
        signature:
          $ref: "#/components/schemas/KeyringRawSignature"
      additionalProperties: false
    KeyringSignedAuthorizationResponse:
      type: object
      required: [authorization, signature]
      properties:
        authorization:
          $ref: "#/components/schemas/KeyringEnvelopeObject"
        signature:
          $ref: "#/components/schemas/KeyringRawSignature"
      additionalProperties: false
    ReadinessResponse:
      type: object
      required: [ready, checks]
      properties:
        ready:
          type: boolean
        checks:
          type: object
          required:
            - database
            - endpoint_secret
            - receipt_secret
            - keyring_backend
            - keyring_password
            - keyring_secret
            - keystore_path
            - base_rpc_url
            - base_rpc_reachable
          properties:
            database:
              type: boolean
            endpoint_secret:
              type: boolean
            receipt_secret:
              type: boolean
            keyring_backend:
              type: boolean
            keyring_password:
              type: boolean
            keyring_secret:
              type: boolean
            keystore_path:
              type: boolean
            base_rpc_url:
              type: boolean
            base_rpc_reachable:
              type: boolean
          additionalProperties: false
      additionalProperties: false
    LooseObject:
      type: object
      additionalProperties: true
    ServiceError:
      type: object
      required: [code, message]
      additionalProperties: true
      properties:
        code:
          type: string
        message:
          type: string
    ErrorEnvelope:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          $ref: "#/components/schemas/ServiceError"
      additionalProperties: true
    SimpleError:
      type: object
      required: [error]
      properties:
        error:
          type: string
      additionalProperties: false
