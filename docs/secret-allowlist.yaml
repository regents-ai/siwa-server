repo: siwa-server
purpose: shared_siwa_service
allowed_secret_env:
  - DATABASE_URL
  - SECRET_KEY_BASE
  - SIWA_RECEIPT_SECRET
  - KEYSTORE_PASSWORD
  - KEYRING_PROXY_SECRET
  - BASE_RPC_URL
allowed_runtime_env:
  - PHX_SERVER
  - PHX_HOST
  - PORT
  - DNS_CLUSTER_QUERY
  - ECTO_IPV6
  - POOL_SIZE
  - SIWA_NONCE_TTL_SECONDS
  - SIWA_RECEIPT_TTL_SECONDS
  - SIWA_HTTP_SIGNATURE_TOLERANCE_SECONDS
  - SIWA_CLEANUP_ENABLED
  - SIWA_CLEANUP_INTERVAL_MS
  - SIWA_CLEANUP_BATCH_SIZE
  - KEYSTORE_BACKEND
  - KEYSTORE_PATH
allowed_local_test_env:
  - PGUSER
  - PGPASSWORD
  - PGHOST
  - USER
  - MIX_TEST_PARTITION
allowed_secret_classes:
  - shared_siwa_receipt_signing
  - shared_siwa_nonce_and_replay_storage
  - shared_keyring_proxy_hmac
  - shared_keyring_keystore_password
  - shared_keyring_mounted_wallet_state
  - base_rpc_endpoint_for_agent_ownership_checks
forbidden_secret_classes:
  - product_session_cookie_secret
  - product_billing_secret
  - product_privy_secret
  - product_launch_deploy_secret
  - product_trust_followup_secret
  - product_content_pinning_secret
  - mobile_payment_secret
  - mobile_push_secret
  - operator_local_wallet_secret
  - product_room_policy_secret
